from_latest_tag = false
ignore_merge_commits = true
branch_whitelist = []
tag_prefix = "v"

pre_bump_hooks = [
    "mvn versions:set -DnewVersion={{version}} -DgenerateBackupPoms=false",
    "git add pom.xml",
]

post_bump_hooks = [
    "git push",
    "git push origin v{{version}}",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "d34j"
owner = "esalbuquerquebr"
